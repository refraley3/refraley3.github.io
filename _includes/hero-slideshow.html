<div class="hero-slideshow">
  <a href="{{ '/gallery/' | relative_url }}" class="hero-slideshow-link" aria-label="{{ slide.alt }}">
    {% for slide in include.slides %}
    <img
      src="{{ slide.src | relative_url }}"
      alt="{{ slide.alt }}"
      class="hero-slide{% if forloop.first %} is-active{% endif %}">
    {% endfor %}
  </a>
</div>
